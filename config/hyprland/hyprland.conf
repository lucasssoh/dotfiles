# Hyprland minimal config

# Compositor options
monitor=auto
dpi=96
cursor_theme=default
cursor_size=24
scale=1.0

# Default terminal
terminal=foot

# Floating windows rules
floatclass=confirm,dialog,download,toolbar,utility

# Keybindings
mod=SUPER
bind=SUPER+Return,exec,foot
bind=SUPER+d,exec,wofi --show drun
bind=SUPER+Shift+q,close
bind=SUPER+Shift+r,reload

# Autostart
exec=waybar
exec=starship init bash

# Wallpaper
exec=hyprpaper wallpaper ~/Pictures/Wallpapers/pepper-carrot.jpg