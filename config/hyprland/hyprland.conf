# =============================================================================
# HYPRLAND CONFIGURATION - LUCAS RAMILISON (FEDORA 43)
# =============================================================================

# --- Moniteurs ---
# auto : détecte la résolution native de ton laptop
monitor=,preferred,auto,1

# --- Variables ---
$terminal = foot
$menu = wofi --show drun
$mainMod = SUPER

# --- Look & Feel (Optimisation Batterie) ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 10
    # Désactiver le flou (blur) peut sauver un peu de batterie sur VM/Laptop
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

# --- Input (Configuration Laptop & AZERTY) ---
input {
    kb_layout = fr
    follow_mouse = 1

    touchpad {
        natural_scroll = yes
        tap-to-click = yes
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

# --- Autostart ---
# On lance les démons une seule fois au démarrage
exec-once = hyprpaper & waybar

# --- Règles de fenêtres (Window Rules) ---
# Pour que les dialogues ne prennent pas tout l'écran
windowrulev2 = float,class:^(confirm|dialog|download|toolbar|utility|notification)$

# --- Raccourcis Clavier (Keybindings) ---
# SUPER + Entrée pour le terminal (foot est ultra léger)
bind = $mainMod, Return, exec, $terminal

# SUPER + D pour le lanceur d'applications (Wofi)
bind = $mainMod, D, exec, $menu

# SUPER + SHIFT + Q pour fermer la fenêtre active
bind = $mainMod SHIFT, Q, killactive, 

# SUPER + SHIFT + R pour recharger la config proprement
bind = $mainMod SHIFT, R, exec, hyprctl reload

# SUPER + M pour quitter Hyprland (retour au TTY)
bind = $mainMod SHIFT, M, exit, 

# --- Déplacements (Vim-style focus) ---
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# --- Gestion du son et luminosité (indispensable sur laptop) ---
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-