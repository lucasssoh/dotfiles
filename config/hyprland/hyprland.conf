# =============================================================================
# HYPRLAND CONFIGURATION - LUCAS RAMILISON (FEDORA 43)
# =============================================================================
# --- Moniteurs ---
monitor=,preferred,auto,1

# --- Variables ---
$terminal = wezterm
$menu = wofi --show drun
$mainMod = SUPER

# --- Look & Feel (Dark Forest) ---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(2ecc71ee) rgba(1b4d2bee) 45deg
    col.inactive_border = rgba(1a1a1aaa)
    layout = dwindle
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 4
        passes = 2
    }
}

# --- Input (Laptop & AZERTY) ---
input {
    kb_layout = fr
    touchpad {
        natural_scroll = yes
        tap-to-click = yes
    }
}

# --- Autostart ---
exec-once = hyprpaper & waybar & wal -R

# --- Raccourcis Système ---
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod SHIFT, M, exit,

# --- Navigation Workspaces (AZERTY) ---
bind = $mainMod, ampersand,  workspace, 1
bind = $mainMod, eacute,     workspace, 2
bind = $mainMod, quotedbl,   workspace, 3
bind = $mainMod, apostrophe, workspace, 4
bind = $mainMod, parenleft,  workspace, 5
bind = $mainMod, minus,      workspace, 6
bind = $mainMod, egrave,     workspace, 7
bind = $mainMod, underscore, workspace, 8
bind = $mainMod, ccedilla,   workspace, 9
bind = $mainMod, agrave,     workspace, 10

# --- Déplacer fenêtre vers Workspace ---
bind = $mainMod SHIFT, ampersand,  movetoworkspace, 1
bind = $mainMod SHIFT, eacute,     movetoworkspace, 2
bind = $mainMod SHIFT, quotedbl,   movetoworkspace, 3
bind = $mainMod SHIFT, apostrophe, movetoworkspace, 4
bind = $mainMod SHIFT, parenleft,  movetoworkspace, 5
bind = $mainMod SHIFT, minus,      movetoworkspace, 6
bind = $mainMod SHIFT, egrave,     movetoworkspace, 7
bind = $mainMod SHIFT, underscore, movetoworkspace, 8
bind = $mainMod SHIFT, ccedilla,   movetoworkspace, 9
bind = $mainMod SHIFT, agrave,     movetoworkspace, 10

# --- Focus (Vim Style) ---
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# --- Laptop Keys ---
binde = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binde = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# --- Mode Passthrough (VM) ---
bind = $mainMod, Escape, submap, passthrough
submap = passthrough
bind = $mainMod, Escape, submap, reset
submap = reset

# --- Popups Waybar ---
windowrulev2 = float,           class:^(network-popup|bt-popup)$
windowrulev2 = size 700 450,    class:^(network-popup|bt-popup)$
windowrulev2 = move center,     class:^(network-popup|bt-popup)$
windowrulev2 = animation popin, class:^(network-popup|bt-popup)$
windowrulev2 = noinitialfocus,  class:^(network-popup|bt-popup)$