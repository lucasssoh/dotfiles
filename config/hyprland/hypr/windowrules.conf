# ============================================================
# WINDOWRULES.CONF — Per-app window rules
# ============================================================

# Firefox
windowrulev2 = opacity 1.0 override, class:^(firefox)$
windowrulev2 = workspace 2, class:^(firefox)$

# WezTerm
windowrulev2 = opacity 0.95 override, class:^(org.wezfurlong.wezterm)$

# Thunar — dialog windows float, main window tiles
windowrulev2 = float,        class:^(thunar)$, title:^(?!.*— Thunar)
windowrulev2 = size 900 600, class:^(thunar)$, title:^(?!.*— Thunar)
windowrulev2 = center,       class:^(thunar)$, title:^(?!.*— Thunar)
windowrulev2 = opacity 0.95 override, class:^(thunar)$

# System dialogs — always floating and centered
windowrulev2 = float,  class:^(polkit-gnome-authentication-agent-1)$
windowrulev2 = center, class:^(polkit-gnome-authentication-agent-1)$
windowrulev2 = float,  title:^(Open File)$
windowrulev2 = float,  title:^(Open Folder)$
windowrulev2 = float,  title:^(Save As)$
windowrulev2 = float,  title:^(Preferences)$
windowrulev2 = float,  title:^(Settings)$

# Pavucontrol — floating mixer
windowrulev2 = float,        class:^(pavucontrol)$
windowrulev2 = size 700 450, class:^(pavucontrol)$
windowrulev2 = center,       class:^(pavucontrol)$

# Dunst — no focus steal
windowrulev2 = noinitialfocus, class:^(dunst)$

# All floating windows → centered
windowrulev2 = center, floating:1

# Disable blur on heavy apps to save GPU
windowrulev2 = noblur, class:^(firefox)$

windowrulev2 = float,        class:^(calendar)$
windowrulev2 = size 820 420, class:^(calendar)$
windowrulev2 = center,       class:^(calendar)$
windowrulev2 = stayfocused,  class:^(calendar)$
