# ============================================================
# HYPRLAND.CONF — Main config
# ============================================================

source = ~/.config/hypr/colors.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/windowrules.conf

# ============================================================
# AUTOSTART
# ============================================================
exec-once = WAYBAR_DISABLE_PORTAL=1 waybar
exec-once = dunst
exec-once = swww-daemon
exec-once = ~/.config/hypr/scripts/restore_wallpaper.sh
exec-once = hypridle
exec-once = wl-paste --watch cliphist store
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ============================================================
# ENVIRONMENT
# ============================================================
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = MOZ_ENABLE_WAYLAND,1

# ============================================================
# INPUT
# ============================================================
input {
    kb_layout = fr
    kb_variant = azerty
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
        scroll_factor = 0.3
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_cancel_ratio = 0.2
}

# ============================================================
# GENERAL
# ============================================================
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 1
    col.active_border = $accent
    col.inactive_border = $overlay
    layout = dwindle
    resize_on_border = true
}

# ============================================================
# DECORATION
# ============================================================
decoration {
    rounding = 10

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
        ignore_opacity = false
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(0, 0, 0, 0.4)
        color_inactive = rgba(0, 0, 0, 0.2)
    }

    inactive_opacity = 0.93
    active_opacity = 1.0
}

# ============================================================
# ANIMATIONS — Smooth but restrained
# ============================================================
animations {
    enabled = true
    bezier = smooth,  0.05, 0.9, 0.1, 1.05
    bezier = linear,  0.0,  0.0, 1.0, 1.0
    bezier = snap,    0.2,  1.0, 0.2, 1.0

    animation = windows,     1, 4,  smooth,  slide
    animation = windowsOut,  1, 3,  snap,    slide
    animation = border,      1, 8,  linear
    animation = fade,        1, 4,  smooth
    animation = workspaces,  1, 4,  snap,    slidevert
}

# ============================================================
# LAYOUT
# ============================================================
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true                   # laptop power saving
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

cursor {
    no_hardware_cursors = false
}
