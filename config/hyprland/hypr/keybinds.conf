# ============================================================
# KEYBINDS.CONF — Key bindings (AZERTY layout)
# ============================================================
$mod = SUPER

# ============================================================
# APPLICATIONS
# ============================================================
bind = $mod, Return,    exec, wezterm
bind = $mod, E,         exec, thunar
bind = $mod, B,         exec, firefox
bind = $mod, Space,     exec, rofi -show drun -theme ~/.config/rofi/launcher.rasi
bind = $mod, V,         exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/launcher.rasi | cliphist decode | wl-copy
bind = $mod SHIFT, S,   exec, grimblast copy area   # zone screenshot
bind = ,     Print,     exec, grimblast copy screen  # full screenshot
bind = $mod, W, exec, dex $HOME/.local/share/applications/set_wallpaper.desktop || gtk-launch set_wallpaper
# ============================================================
# WINDOWS
# ============================================================
bind = $mod, Q,         killactive
bind = $mod, F,         fullscreen, 0
bind = $mod SHIFT, F,   fullscreen, 1
bind = $mod, P,         pseudo
bind = $mod, T,         togglesplit
bind = $mod SHIFT, Space, togglefloating

# Focus (hjkl)
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# Move window
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# Resize submap
bind = $mod, R, submap, resize
submap = resize
    binde = , H, resizeactive, -30 0
    binde = , L, resizeactive, 30  0
    binde = , K, resizeactive, 0  -30
    binde = , J, resizeactive, 0   30
    bind  = , Escape, submap, reset
    bind  = , Return, submap, reset
submap = reset

# ============================================================
# WORKSPACES — AZERTY number row
# ============================================================
bind = $mod, ampersand,  workspace, 1
bind = $mod, eacute,     workspace, 2
bind = $mod, quotedbl,   workspace, 3
bind = $mod, apostrophe, workspace, 4
bind = $mod, parenleft,  workspace, 5
bind = $mod, minus,      workspace, 6
bind = $mod, egrave,     workspace, 7
bind = $mod, underscore, workspace, 8
bind = $mod, ccedilla,   workspace, 9
bind = $mod, agrave,     workspace, 10

bind = $mod SHIFT, ampersand,  movetoworkspace, 1
bind = $mod SHIFT, eacute,     movetoworkspace, 2
bind = $mod SHIFT, quotedbl,   movetoworkspace, 3
bind = $mod SHIFT, apostrophe, movetoworkspace, 4
bind = $mod SHIFT, parenleft,  movetoworkspace, 5
bind = $mod SHIFT, minus,      movetoworkspace, 6
bind = $mod SHIFT, egrave,     movetoworkspace, 7
bind = $mod SHIFT, underscore, movetoworkspace, 8
bind = $mod SHIFT, ccedilla,   movetoworkspace, 9
bind = $mod SHIFT, agrave,     movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mod, S,       togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic

# Scroll bar to switch workspace
bind = $mod, mouse_down, workspace, e-1
bind = $mod, mouse_up,   workspace, e+1

# ============================================================
# MOUSE — floating window drag/resize
# ============================================================
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ============================================================
# SYSTEM
# ============================================================
bind = $mod, L,           exec, hyprlock
bind = $mod SHIFT, M,     exit
bind = $mod SHIFT, R,     exec, hyprctl reload

# Audio (media keys)
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Media player
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous
bindl = , XF86AudioNext,  exec, playerctl next
