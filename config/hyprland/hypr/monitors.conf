# ============================================================
# MONITORS.CONF — Dynamic multi-monitor setup
# ============================================================
# Laptop only    : internal display activates automatically
# External screen: detected and placed to the right automatically
# ============================================================

# Internal laptop display (auto-detected)
monitor = eDP-1, preferred, 0x0, 1
monitor = eDP-1, addreserved, 0, 0, 0, 0

# External displays: auto-placed to the right of the laptop
# Replace "HDMI-A-1" with your actual output name (run `hyprctl monitors`)
monitor = HDMI-A-1, preferred, auto, 1
monitor = DP-1,     preferred, auto, 1
monitor = DP-2,     preferred, auto, 1

# Fallback: any unknown plugged display → auto-enabled to the right
monitor = ,preferred,auto,1

# Workspaces 1-7 on laptop, 8-10 on external screen if available
workspace = 1,  monitor:eDP-1
workspace = 2,  monitor:eDP-1
workspace = 3,  monitor:eDP-1
workspace = 4,  monitor:eDP-1
workspace = 5,  monitor:eDP-1
workspace = 6,  monitor:eDP-1
workspace = 7,  monitor:eDP-1
workspace = 8,  monitor:HDMI-A-1, default:true
workspace = 9,  monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1
