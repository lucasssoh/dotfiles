# ============================================================
# HYPRLOCK.CONF — Clean lock screen
# ============================================================

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 2
    no_fade_in = false
}

background {
    monitor =
    path = ~/.config/hypr/wallpaper.jpg
    blur_size = 7
    blur_passes = 4
    brightness = 0.5
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color = rgba(229, 229, 234, 1.0)
    font_size = 80
    font_family = SF Pro Display, Inter, sans-serif
    position = 0, 120
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A %d %B')"
    color = rgba(142, 142, 147, 1.0)
    font_size = 18
    font_family = SF Pro Text, Inter, sans-serif
    position = 0, 40
    halign = center
    valign = center
}

# Password field
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 1
    dots_size = 0.28
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(99, 99, 102, 0.6)
    inner_color = rgba(28, 28, 30, 0.8)
    font_color = rgba(229, 229, 234, 1.0)
    fade_on_empty = true
    placeholder_text = <span foreground="##8e8e93">Password</span>
    hide_input = false
    rounding = 10
    check_color = rgba(107, 159, 255, 1.0)
    fail_color = rgba(255, 69, 58, 1.0)
    fail_text = <i>Incorrect</i>
    capslock_color = rgba(255, 214, 10, 1.0)
    position = 0, -80
    halign = center
    valign = center
}
