# --- FENETRE ---
window_padding_width 0 10
# --- POLICE ---
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic

font_size        11.0

# Optimisation pour l'affichage des symboles
disable_ligatures never
# --- APPARENCE ---
background_opacity 0.85
# Note : Le blur nécessite un compositeur compatible (Hyprland ou KDE)
background_blur 1
dynamic_background_opacity yes

# --- CURSOR TRAIL (L'effet recherché) ---
cursor_shape block
shell_integration no-cursor
cursor_trail 10
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# --- MULTIPLEXAGE (PANNEAUX & FENÊTRES) ---
# On utilise le layout 'splits' pour imiter WezTerm
enabled_layouts splits,stack
window_border_width 0.5pt
active_border_color #ffcc00
inactive_text_alpha 0.8

# --- NAVIGATION & RACCOURCIS ---
# Supprimer les raccourcis par défaut gênants
clear_all_shortcuts yes

# Recharger la config (CTRL+SHIFT+F5)
map ctrl+shift+f5 load_config_file

# Diviser l'écran (ALT+V et ALT+H)
map alt+v launch --location=vsplit --cwd=current
map alt+h launch --location=hsplit --cwd=current

# Naviguer entre les panneaux (ALT + Flèches)
map alt+left neighboring_window left
map alt+right neighboring_window right
map alt+up neighboring_window up
map alt+down neighboring_window down

# Redimensionner (SHIFT + ALT + Flèches)
map shift+alt+left resize_window narrower 5
map shift+alt+right resize_window wider 5
map shift+alt+up resize_window taller 5
map shift+alt+down resize_window shorter 5

# Fermer le panneau (ALT+X)
map alt+x close_window

# Zoom (ALT+Z) - On bascule sur le layout stack
map alt+z toggle_layout stack

# --- ONGLETS (TABS) ---
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"
# Cache la barre si un seul onglet est ouvert
tab_bar_min_tabs 2

# --- THÈME COULEURS (Humanoid Dark Base16) ---
foreground #f8f8f2
background #232629
selection_foreground #f8f8f2
selection_background #484e54

# Black
color0 #232629
color8 #484e54
# Red
color1 #b0151a
color9 #b0151a
# Green
color2 #028902
color10 #028902
# Yellow
color3 #ffb400
color11 #ffb400
# Blue
color4 #0082c9
color12 #0082c9
# Magenta
color5 #6d61a1
color13 #6d61a1
# Cyan
color6 #008b8b
color14 #008b8b
# White
color7 #f8f8f2
color15 #fcfcf6
