# ============================================================
# CONFIGURATION FINALE - TMUX
# ============================================================

# --- TERMINAL ET COULEURS ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm' # Support des underscores
set -g xterm-keys on
set -s extended-keys on

# --- STYLE DES PANNEAUX (LIGNES PLEINES) ---
# 'heavy' force des lignes pleines et épaisses. 
# 'single' ferait des lignes pleines mais fines.
set -g pane-border-lines single
set -g pane-border-style "fg=#484e54"
set -g pane-active-border-style "fg=#ffb400"

# Effet Focus (Actif vs Inactif)
set -g window-style "fg=#a8a8a2,bg=#232629"
set -g window-active-style "fg=#f8f8f2,bg=#232629"

# --- CONFIGURATION GÉNÉRALE ---
set -g mouse on
set -s escape-time 0
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1

# --- RACCOURCIS CLAVIER (ALT) ---

# Alt + v / Alt + s : Splits
bind -n M-v split-window -h -c "#{pane_current_path}"
bind -n M-s split-window -v -c "#{pane_current_path}"

# Alt + x : Fermer le panneau actuel (SANS CONFIRMATION)
bind -n M-x kill-pane

# Alt + hjkl : Navigation
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# --- REDIMENSIONNEMENT (Prefix + hjkl) ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- BARRE DE STATUT ---
set -g status-position top

set -g status-style "bg=default"
set -g status-left "#[fg=blue,bold]#S "
set -g status-right "#[fg=yellow]%H:%M #[fg=green]%d-%b"

# Supprimer les anciens bindings par défaut pour éviter les conflits
unbind '"'
unbind %
